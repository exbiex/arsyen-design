<!-- @dsCard group="Components" viewport="700x360" name="Forms & controls" subtitle="Inputs, switches, filter chips, segmented controls" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 22px; max-width: 640px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-4); width: 100%; margin-bottom: -8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Input, Switch, FilterChip, SegmentedControl } = window.ArsyenDesignSystem_992fe7;
    const Search = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="m11 11 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>;
    function Demo() {
      const [sw1, setSw1] = React.useState(true);
      const [sw2, setSw2] = React.useState(false);
      const [crew, setCrew] = React.useState(true);
      const [back, setBack] = React.useState("Pure black");
      const [col, setCol] = React.useState("To do");
      return (
        <div className="stack">
          <div className="row">
            <Input label="Username or email" placeholder="renn or you@studio.com" containerStyle={{ flex: 1, minWidth: 260 }} />
            <Input label="Search" icon={<Search/>} placeholder="Search artists…" containerStyle={{ flex: 1, minWidth: 220 }} />
          </div>
          <div className="row">
            <span className="lab">Switches</span>
            <Switch checked={sw1} onChange={setSw1} />
            <Switch checked={sw2} onChange={setSw2} />
            <Switch checked={false} disabled />
          </div>
          <div className="row">
            <span className="lab">Filter chips</span>
            <FilterChip>Discipline</FilterChip>
            <FilterChip>Location</FilterChip>
            <FilterChip selected={crew} onClick={() => setCrew(!crew)}>Open to crew</FilterChip>
            <FilterChip>Rate</FilterChip>
          </div>
          <div className="row">
            <span className="lab">Segmented · track &amp; chips</span>
            <SegmentedControl options={["Pure black","Living"]} value={back} onChange={setBack} />
            <SegmentedControl chips options={["To do","In progress","Review","Done"]} value={col} onChange={setCol} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
