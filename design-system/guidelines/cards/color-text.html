<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; }
  .rows { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .demo { font-family: var(--font-display); font-size: 21px; font-weight: 600;
    letter-spacing: -.01em; width: 320px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="rows">
    <div class="row"><div class="demo" style="color: var(--ink-0);">The quick brown fox</div><div class="meta">ink-0 · primary · #f6f6f7</div></div>
    <div class="row"><div class="demo" style="color: var(--ink-1);">The quick brown fox</div><div class="meta">ink-1 · strong · #c7c7cc</div></div>
    <div class="row"><div class="demo" style="color: var(--ink-2);">The quick brown fox</div><div class="meta">ink-2 · body · #9b9ba2</div></div>
    <div class="row"><div class="demo" style="color: var(--ink-3);">The quick brown fox</div><div class="meta">ink-3 · label · #6c6c74</div></div>
    <div class="row"><div class="demo" style="color: var(--ink-4);">The quick brown fox</div><div class="meta">ink-4 · faint · #48484f</div></div>
  </div>
</body>
</html>
