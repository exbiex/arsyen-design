<!-- @dsCard group="Components" viewport="700x320" name="Buttons" subtitle="Coral CTA, quiet variants, sizes, icon buttons" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-4); width: 100%; margin-bottom: -6px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, IconButton } = window.ArsyenDesignSystem_992fe7;
    const Plus = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3.2v9.6M3.2 8h9.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>;
    const Chat = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.5 4.2C2.5 3.3 3.3 2.5 4.2 2.5h7.6c.9 0 1.7.8 1.7 1.7v4.8c0 .9-.8 1.7-1.7 1.7H6.5L3.5 13V4.2Z" stroke="currentColor" stroke-width="1.4"/></svg>;
    const Dots = () => <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><circle cx="4" cy="9" r="1.4"/><circle cx="9" cy="9" r="1.4"/><circle cx="14" cy="9" r="1.4"/></svg>;

    function Demo() {
      return (
        <div className="stack">
          <div className="row">
            <span className="lab">Variants</span>
            <Button>Message</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="outline">Set</Button>
            <Button variant="danger">Decline</Button>
          </div>
          <div className="row">
            <span className="lab">Sizes &amp; icons</span>
            <Button size="sm" icon={<Plus/>}>New</Button>
            <Button size="md" icon={<Chat/>}>Message</Button>
            <Button size="lg">Create project</Button>
            <Button disabled>Disabled</Button>
          </div>
          <div className="row">
            <span className="lab">Icon buttons</span>
            <IconButton label="Add"><Plus/></IconButton>
            <IconButton variant="ghost" active label="Folder"><Dots/></IconButton>
            <IconButton variant="accent" label="Chat"><Chat/></IconButton>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
