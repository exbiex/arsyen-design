<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Arsyen — iPhone App</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #07070a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .scroll::-webkit-scrollbar { width: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="../mac/icons.jsx"></script>
<script type="text/babel" src="../mac/ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" data-presets="react">
  function App() {
    const [tab, setTab] = React.useState("projects");
    const [project, setProject] = React.useState(null);
    const [ticket, setTicket] = React.useState(null);
    const scrollRef = React.useRef(null);

    React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [tab, project]);

    let view;
    if (tab === "projects") {
      view = project
        ? <window.BoardScreen project={project} back={() => setProject(null)} openTicket={setTicket} />
        : <window.ProjectsScreen openProject={setProject} />;
    } else if (tab === "discover") view = <window.DiscoverScreen />;
    else if (tab === "tools") view = <window.ToolsScreen />;
    else view = <window.ProfileScreen />;

    const nav = (t) => { setProject(null); setTicket(null); setTab(t); };

    return (
      <window.IOSDevice dark>
        <div style={{ position: "relative", height: "100%", display: "flex", flexDirection: "column" }}>
          <div ref={scrollRef} className="scroll" style={{ flex: 1, overflowY: "auto", paddingTop: 64 }}>
            {view}
          </div>
          <window.TabBar tab={tab} setTab={nav} />
          {ticket && <window.TicketSheet ticket={ticket} onClose={() => setTicket(null)} />}
        </div>
      </window.IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
