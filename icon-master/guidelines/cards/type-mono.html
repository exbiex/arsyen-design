<!-- @dsCard group="Type" viewport="700x230" name="Mono labels" subtitle="SF Mono uppercase — the Arsyen signature: eyebrows, tags, meta" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; }
  .rows { display: flex; flex-direction: column; gap: 18px; }
  .lab { font-family: var(--font-mono); text-transform: uppercase; color: var(--text-muted); }
  .tags { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);
    background: var(--surface-3); border-radius: var(--radius-xs); padding: 4px 8px; }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--accent-ink); }
  .num { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="rows">
    <div class="lab" style="font-size: 13px; letter-spacing: .12em;">YOUR ROLE&nbsp;&nbsp;·&nbsp;&nbsp;NOTIFICATIONS&nbsp;&nbsp;·&nbsp;&nbsp;APPEARANCE</div>
    <div class="lab" style="font-size: 11px; letter-spacing: .12em;">MEMBERS ONLY · BY INVITATION&nbsp;&nbsp;&nbsp;&nbsp;USERNAME OR EMAIL</div>
    <div class="tags">
      <span class="tag">script</span><span class="tag">camera</span><span class="tag">locations</span>
      <span class="tag">post</span><span class="tag">gear</span>
      <span class="meta">96% MATCH</span>
      <span class="num">#1&nbsp;&nbsp;·&nbsp;&nbsp;11%&nbsp;&nbsp;·&nbsp;&nbsp;⌘K</span>
    </div>
  </div>
</body>
</html>
