<!-- @dsCard group="Colors" viewport="700x210" name="Brand accent" subtitle="Coral-red — the single hue that pops on pure black" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; }
  .grid { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 124px; }
  .chip {
    height: 76px; border-radius: var(--radius-md);
    border: 1px solid var(--border-subtle);
    display: flex; align-items: flex-end; padding: 9px;
  }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em;
    color: var(--text-primary); margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .glow { box-shadow: var(--glow-accent); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw">
      <div class="chip glow" style="background: var(--accent);"></div>
      <div class="name">accent</div><div class="hex">#f95d57</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--accent-hover);"></div>
      <div class="name">accent-hover</div><div class="hex">#ff6f6a</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--accent-press);"></div>
      <div class="name">accent-press</div><div class="hex">#e34a44</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--accent-soft);"></div>
      <div class="name">accent-soft</div><div class="hex">14% tint</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--surface-2); color: var(--accent-ink);
        font-family: var(--font-mono); font-size: 22px; align-items:center; justify-content:center;">Aa</div>
      <div class="name">accent-ink</div><div class="hex">#ff716c on dark</div>
    </div>
  </div>
</body>
</html>
