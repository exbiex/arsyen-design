<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; font-family: var(--font-display); }
  .rows { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .d { color: var(--text-primary); font-weight: 700; letter-spacing: -.03em; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); white-space: nowrap; }
</style>
</head>
<body>
  <div class="rows">
    <div class="row"><div class="d" style="font-size: 52px;">SINNERS</div><div class="meta">display-2xl · 56 / 700</div></div>
    <div class="row"><div class="d" style="font-size: 32px; letter-spacing:-.02em;">Settings</div><div class="meta">display-lg · 32 / 700</div></div>
    <div class="row"><div class="d" style="font-size: 26px; font-weight:600; letter-spacing:-.015em;">New project</div><div class="meta">display-md · 26 / 600</div></div>
    <div class="row"><div class="d" style="font-size: 18px; font-weight:600; letter-spacing:-.01em;">Lock final shooting script</div><div class="meta">title-md · 18 / 600</div></div>
  </div>
</body>
</html>
