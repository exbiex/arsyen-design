<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; }
  .grid { display: flex; gap: 14px; }
  .tile { width: 124px; height: 124px; border-radius: var(--radius-lg);
    border: 1px solid var(--border-subtle); }
  .row2 { display: flex; gap: 14px; margin-top: 14px; align-items: center; }
  .av { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile ars-mesh ars-mesh--coral"></div>
    <div class="tile ars-mesh ars-mesh--ember"></div>
    <div class="tile ars-mesh ars-mesh--violet"></div>
    <div class="tile ars-mesh ars-mesh--azure"></div>
    <div class="tile ars-mesh ars-mesh--verdant"></div>
  </div>
  <div class="row2">
    <div class="av ars-mesh ars-mesh--coral"></div>
    <div class="av ars-mesh ars-mesh--azure"></div>
    <div class="meta">.ars-mesh · --coral · --ember · --violet · --azure · --verdant</div>
  </div>
</body>
</html>
