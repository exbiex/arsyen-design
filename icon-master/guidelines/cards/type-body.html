<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; font-family: var(--font-text); }
  .rows { display: flex; flex-direction: column; gap: 14px; max-width: 560px; }
  .row { display: flex; flex-direction: column; gap: 4px; }
  .b { color: var(--ink-1); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="rows">
    <div class="row">
      <div class="b" style="font-size: 16px; color: var(--ink-0);">Night studies, slow work. Building small crews for short films and exhibitions.</div>
      <div class="meta">body-lg · 16 / 400</div>
    </div>
    <div class="row">
      <div class="b" style="font-size: 15px; color: var(--ink-2);">Make the artefacts your projects need — moodboards, briefs, invoices, and more.</div>
      <div class="meta">body-md · 15 / 400 · default</div>
    </div>
    <div class="row">
      <div class="b" style="font-size: 14px; color: var(--ink-3);">When someone wants to commission you, you'll get a nudge here.</div>
      <div class="meta">body-sm · 14 / 400</div>
    </div>
  </div>
</body>
</html>
