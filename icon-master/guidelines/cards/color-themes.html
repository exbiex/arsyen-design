<!-- @dsCard group="Colors" viewport="700x180" name="Accent themes" subtitle="Settings ▸ Accent color — red is default, three alternates" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; }
  .grid { display: flex; gap: 26px; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .disc { width: 64px; height: 64px; border-radius: 50%; border: 1px solid var(--border-default); }
  .disc.on { box-shadow: 0 0 0 3px var(--bg-canvas), 0 0 0 5px currentColor; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="disc on" style="background: var(--accent-red); color: var(--accent-red);"></div><div class="name">red · default</div></div>
    <div class="sw"><div class="disc" style="background: var(--accent-violet);"></div><div class="name">violet</div></div>
    <div class="sw"><div class="disc" style="background: var(--accent-blue);"></div><div class="name">blue</div></div>
    <div class="sw"><div class="disc" style="background: var(--accent-amber);"></div><div class="name">amber</div></div>
  </div>
</body>
</html>
