<!-- @dsCard group="Spacing" viewport="700x200" name="Radii" subtitle="6px tags up to 32px hero panels; pills are fully round" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 26px; }
  .grid { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .box { width: 72px; height: 72px; background: var(--surface-3);
    border: 1px solid var(--border-default); border-top-color: var(--border-strong); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="box" style="border-radius: var(--radius-xs);"></div><div class="meta">xs · 6</div></div>
    <div class="sw"><div class="box" style="border-radius: var(--radius-sm);"></div><div class="meta">sm · 10</div></div>
    <div class="sw"><div class="box" style="border-radius: var(--radius-md);"></div><div class="meta">md · 14</div></div>
    <div class="sw"><div class="box" style="border-radius: var(--radius-lg);"></div><div class="meta">lg · 18</div></div>
    <div class="sw"><div class="box" style="border-radius: var(--radius-xl);"></div><div class="meta">xl · 24</div></div>
    <div class="sw"><div class="box" style="border-radius: var(--radius-2xl);"></div><div class="meta">2xl · 32</div></div>
    <div class="sw"><div class="box" style="border-radius: var(--radius-full); width: 100px;"></div><div class="meta">full · pill</div></div>
  </div>
</body>
</html>
